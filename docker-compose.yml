# Local reference compose file (not built/run in this session -- see README
# Deployment notes on the storage-constrained dev machine). Points OLLAMA_HOST
# at the host machine's own Ollama via host.docker.internal, rather than
# containerizing Ollama itself, since GPU passthrough for the RTX 4060 is a
# separate concern from this app's own build.
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.1:8b-instruct-q4_K_M

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
